<div>
  <h2>Dashboard</h2>
  <div *ngIf="loginData">
    <p>Welcome, {{ loginData.name }}!</p>
  </div>

  <app-search (searchEvent)="onSearch($event)"></app-search>

  <div *ngIf="loading">Loading users...</div>
  <div *ngIf="error">{{ error }}</div>

  <table *ngIf="!loading && filteredUsers.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>City</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of filteredUsers">
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.phone }}</td>
        <td>{{ user.address.city }}</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && filteredUsers.length === 0">
    <p>No users found</p>
  </div>
</div>
